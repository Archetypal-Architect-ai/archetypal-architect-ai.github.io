  <polygon points="600,110 800,338 600,565 400,338" fill="none" stroke="#6f9fd8" stroke-width="8"/>
  <polygon points="600,190 730,338 600,486 470,338" fill="#23292e" stroke="#c64d64" stroke-width="6"/>
  <circle cx="600" cy="338" r="54" fill="#f4efe6"/>
  <circle cx="600" cy="338" r="25" fill="#111315"/>
  <g fill="#f7c477">
    <circle cx="600" cy="110" r="20"/>
